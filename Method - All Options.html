<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Method — All Options</title>
<link rel="stylesheet" href="ds/colors_and_type.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Schibsted+Grotesk:wght@400;500;600;700;800;900&family=Roboto:wght@400;500;600;700;900&family=Inter:wght@400;500;600;700;800&display=swap">
<style>
  html, body { margin:0; height:100%; background:#0b0f17; }
  * { box-sizing:border-box; }
  .sec { width:100%; height:100%; overflow:hidden; position:relative; font-family:'Plus Jakarta Sans', system-ui, sans-serif; }
  .sec.light { background:#F1F4F8; color:#10203A; }
  .sec.white { background:#fff; color:#10203A; }
  .sec.cream { background:#FAFAF7; color:#10203A; }
  .sec.dark  { background:radial-gradient(120% 80% at 50% -10%, #16243a, #080d16 72%); color:#fff; }
  .eyebrow { font:700 12px/1 'Plus Jakarta Sans'; letter-spacing:.18em; text-transform:uppercase; color:#F57C00; }
  .orange { color:#F57C00; }

  /* =========================================================================
     A · CENTERED STEPS + VIDEO (v1–v5) — title centered, steps under, text 2/5 + video 3/5
  ========================================================================= */
  .mhead { text-align:center; }
  .mhead h2 { font:700 42px/1.05 'Plus Jakarta Sans'; letter-spacing:-.03em; margin:14px auto 0; max-width:760px; }
  .sec.dark .mhead h2 .g { color:rgba(255,255,255,.34); }
  .sec.light .mhead h2 .g, .sec.white .mhead h2 .g, .sec.cream .mhead h2 .g { color:rgba(16,32,58,.3); }
  .mhead .intro { font:400 16px/1.6 Roboto; max-width:660px; margin:18px auto 0; }
  .sec.light .mhead .intro, .sec.white .mhead .intro, .sec.cream .mhead .intro { color:rgba(16,32,58,.6); }
  .sec.dark .mhead .intro { color:rgba(255,255,255,.64); }

  .body { display:grid; grid-template-columns:1fr 3fr; gap:48px; align-items:center; margin-top:42px; }

  .mtag { font:700 12px/1 'Plus Jakarta Sans'; letter-spacing:.06em; text-transform:uppercase; }
  .mtext h3 { font:700 26px/1.14 'Plus Jakarta Sans'; letter-spacing:-.025em; margin:13px 0 13px; }
  .mtext p { font:400 15px/1.6 Roboto; margin:0 0 20px; }
  .mtext ul { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:13px; }
  .mtext li { display:flex; align-items:flex-start; gap:11px; font:500 14.5px/1.4 Roboto; }
  .mtext li .ck { flex:0 0 20px; width:20px; height:20px; border-radius:50%; display:grid; place-items:center; font-size:11px; margin-top:1px; }
  .sec.light .mtext p, .sec.white .mtext p, .sec.cream .mtext p { color:rgba(16,32,58,.62); }
  .sec.light .mtext li, .sec.white .mtext li, .sec.cream .mtext li { color:rgba(16,32,58,.82); }
  .sec.dark .mtext p { color:rgba(255,255,255,.62); }
  .sec.dark .mtext li { color:rgba(255,255,255,.84); }

  .vid { position:relative; width:100%; aspect-ratio:16/9; border-radius:16px; overflow:hidden; background:#0c1424;
    box-shadow:0 30px 64px -28px rgba(8,18,40,.55); cursor:pointer; }
  .vid img { display:block; width:100%; height:100%; object-fit:cover; transition:transform .6s cubic-bezier(.2,0,0,1); }
  .vid:hover img { transform:scale(1.035); }
  .vid .vgrad { position:absolute; inset:0; background:linear-gradient(180deg, rgba(6,11,20,.05) 30%, rgba(6,11,20,.62) 100%); }
  .vid .play { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:74px; height:74px; border-radius:50%;
    border:none; cursor:pointer; display:grid; place-items:center; background:#F57C00; box-shadow:0 10px 30px rgba(245,124,0,.5); transition:transform .2s; }
  .vid:hover .play { transform:translate(-50%,-50%) scale(1.08); }
  .vid .play::before { content:""; border-style:solid; border-width:11px 0 11px 18px; border-color:transparent transparent transparent #fff; margin-left:4px; }
  .vid .ring { position:absolute; left:50%; top:50%; width:74px; height:74px; border-radius:50%; transform:translate(-50%,-50%);
    border:1.5px solid rgba(255,255,255,.45); opacity:0; }
  .vid:hover .ring { animation:vring 2.4s cubic-bezier(.2,0,0,1) infinite; }
  @keyframes vring { from { opacity:.6; transform:translate(-50%,-50%) scale(1); } to { opacity:0; transform:translate(-50%,-50%) scale(1.7); } }
  .vid .vcap { position:absolute; left:18px; bottom:16px; right:88px; font:600 14px/1.3 'Plus Jakarta Sans'; color:#fff; }
  .vid .vdur { position:absolute; right:16px; bottom:16px; font:600 11px/1 'Plus Jakarta Sans'; color:#fff;
    background:rgba(8,14,24,.55); border:1px solid rgba(255,255,255,.22); padding:5px 8px; border-radius:6px; backdrop-filter:blur(4px); }

  /* Product UI layout (replaces the video in the 3/4 column) */
  .stepui { width:100%; aspect-ratio:16/9; border-radius:16px; overflow:hidden; background:#0b1322; display:flex; flex-direction:column;
    box-shadow:0 30px 64px -28px rgba(8,18,40,.55); border:1px solid rgba(16,32,58,.14); }
  .sec.dark .stepui { border-color:rgba(255,255,255,.08); box-shadow:0 40px 90px -40px rgba(0,0,0,.9), 0 0 70px -34px rgba(245,124,0,.3); }
  .stepui .tb { flex:0 0 42px; background:#0a1120; display:flex; align-items:center; gap:7px; padding:0 14px; border-bottom:1px solid rgba(255,255,255,.06); }
  .stepui .tb i { width:10px; height:10px; border-radius:50%; background:#2c3a52; display:block; }
  .stepui .tb .u { margin-left:14px; height:22px; flex:1; max-width:300px; border-radius:8px; background:#162338; display:flex; align-items:center; padding:0 12px; font:600 11px/1 Roboto; color:rgba(255,255,255,.42); }
  .stepui .pane { flex:1; display:grid; grid-template-columns:1.05fr 1fr; min-height:0; }
  .stepui .bd { position:relative; overflow:hidden; }
  .stepui .bd img { width:100%; height:100%; object-fit:cover; display:block; }
  .stepui .bd .badge { position:absolute; left:14px; top:14px; display:inline-flex; align-items:center; gap:8px; padding:7px 12px; border-radius:100px;
    background:rgba(8,13,22,.72); border:1px solid rgba(255,255,255,.18); backdrop-filter:blur(6px); font:700 11px/1 'Plus Jakarta Sans'; color:#fff; }
  .stepui .bd .badge em { width:7px; height:7px; border-radius:50%; background:#F57C00; box-shadow:0 0 0 3px rgba(245,124,0,.25); }
  .stepui .pnl { padding:20px 22px; color:#fff; display:flex; flex-direction:column; gap:13px; background:#0b1322; border-left:1px solid rgba(255,255,255,.06); min-width:0; }
  .stepui .ph { display:flex; align-items:center; gap:9px; font:700 13.5px/1 'Plus Jakarta Sans'; color:#fff; }
  .stepui .ph .dot { width:22px; height:22px; border-radius:50%; background:linear-gradient(135deg,#F8A754,#F57C00); flex:0 0 22px; }
  .stepui .ph .r { margin-left:auto; font:600 11px/1 Roboto; color:rgba(255,255,255,.45); }
  .stepui .bignum { display:flex; align-items:baseline; justify-content:space-between; }
  .stepui .bignum .lab { font:500 12px/1 Roboto; color:rgba(255,255,255,.5); }
  .stepui .bignum .v { font:800 30px/1 'Schibsted Grotesk'; color:#fff; letter-spacing:-.02em; }
  .stepui .evalbar2 { height:9px; border-radius:6px; background:linear-gradient(90deg,#15203a,#27374f); position:relative; }
  .stepui .evalbar2 b { position:absolute; top:-3px; width:4px; height:15px; border-radius:2px; background:#fff; box-shadow:0 0 0 2px rgba(245,124,0,.5); }
  .stepui .wklist, .stepui .lessons { display:flex; flex-direction:column; gap:8px; }
  .stepui .wk { display:flex; align-items:center; gap:9px; font:500 12.5px/1.3 Roboto; color:rgba(255,255,255,.84);
    background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:9px; padding:9px 11px; }
  .stepui .wk em { width:7px; height:7px; border-radius:50%; flex:0 0 7px; }
  .stepui .wk s { margin-left:auto; text-decoration:none; font:700 10px/1 'Plus Jakarta Sans'; letter-spacing:.04em; padding:4px 8px; border-radius:100px; }
  .stepui .hi { background:rgba(240,80,80,.16); color:#ff9b9b; } .stepui em.hi { background:#ff6b6b; }
  .stepui .md { background:rgba(245,124,0,.18); color:#F8A754; } .stepui em.md { background:#F8A754; }
  .stepui .lo { background:rgba(75,155,191,.18); color:#86c5e0; } .stepui em.lo { background:#86c5e0; }
  .stepui .gmrow { display:flex; align-items:center; gap:11px; }
  .stepui .gmrow img { width:38px; height:38px; border-radius:50%; object-fit:cover; flex:0 0 38px; border:1.5px solid rgba(245,124,0,.5); }
  .stepui .gmn { font:700 13px/1 'Plus Jakarta Sans'; color:#fff; }
  .stepui .gmt { font:500 11px/1 Roboto; color:rgba(255,255,255,.5); margin-top:4px; }
  .stepui .prog2 { height:8px; border-radius:5px; background:rgba(255,255,255,.1); position:relative; overflow:hidden; }
  .stepui .prog2 b { position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg,#F8A754,#F57C00); border-radius:5px; }
  .stepui .ls { display:flex; align-items:center; gap:10px; font:500 12.5px/1.3 Roboto; color:rgba(255,255,255,.84); }
  .stepui .ls .lk { width:18px; height:18px; border-radius:5px; border:1.5px solid rgba(255,255,255,.22); flex:0 0 18px; display:grid; place-items:center; font-size:10px; color:#fff; }
  .stepui .ls.done .lk { background:#F57C00; border-color:#F57C00; }
  .stepui .ls.done { color:rgba(255,255,255,.55); }
  .stepui .ls.on .lk { border-color:#F8A754; color:#F8A754; }
  .stepui .puz { display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding:11px 13px; border-radius:10px;
    background:rgba(245,124,0,.1); border:1px solid rgba(245,124,0,.22); font:600 12px/1 Roboto; color:rgba(255,255,255,.78); }
  .stepui .puz b { font:800 13px/1 'Schibsted Grotesk'; color:#F8A754; }
  .stepui .bug { display:flex; flex-direction:column; gap:9px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:11px; padding:12px 13px; margin-top:auto; }
  .stepui .bugh { font:700 11px/1 'Plus Jakarta Sans'; letter-spacing:.06em; text-transform:uppercase; color:#F8A754; }
  .stepui .bugrow { display:flex; align-items:center; gap:9px; font:500 12.5px/1 Roboto; color:rgba(255,255,255,.84); }
  .stepui .bugrow em { width:7px; height:7px; border-radius:50%; flex:0 0 7px; }
  .stepui .bugrow s { margin-left:auto; text-decoration:none; font:700 11px/1 'Schibsted Grotesk'; color:rgba(255,255,255,.6); }

  /* V1 · Underline tabs */
  .v1 { padding:54px 64px; }
  .v1 .steps { display:flex; justify-content:center; gap:0; margin-top:30px; border-bottom:1px solid rgba(16,32,58,.12); }
  .v1 .step { background:none; border:none; cursor:pointer; padding:0 30px 18px; position:relative; text-align:center; }
  .v1 .step .n { font:800 13px/1 'Schibsted Grotesk'; color:rgba(16,32,58,.3); }
  .v1 .step .t { font:700 17px/1.2 'Plus Jakarta Sans'; color:rgba(16,32,58,.5); margin-top:7px; transition:color .2s; letter-spacing:-.01em; }
  .v1 .step.on .t { color:#10203A; }
  .v1 .step.on .n { color:#F57C00; }
  .v1 .step .bar { position:absolute; left:24px; right:24px; bottom:-1px; height:2.5px; background:#F57C00; border-radius:3px; transform:scaleX(0); transition:transform .25s; }
  .v1 .step.on .bar { transform:scaleX(1); }
  .v1 .mtext li .ck { background:#FEF2E6; color:#DF7100; }

  /* V2 · Connected flow */
  .v2 { padding:52px 64px; }
  .v2 .steps { display:flex; justify-content:center; align-items:flex-start; margin-top:30px; max-width:720px; margin-left:auto; margin-right:auto; }
  .v2 .step { background:none; border:none; cursor:pointer; padding:0; display:flex; flex-direction:column; align-items:center; gap:11px; width:150px; }
  .v2 .step .dot { width:46px; height:46px; border-radius:50%; display:grid; place-items:center; font:800 16px/1 'Schibsted Grotesk';
    background:#fff; border:1.5px solid rgba(16,32,58,.16); color:rgba(16,32,58,.5); transition:.25s; }
  .v2 .step.on .dot { background:#F57C00; border-color:#F57C00; color:#fff; box-shadow:0 8px 20px -6px rgba(245,124,0,.55); }
  .v2 .step .t { font:700 15px/1.2 'Plus Jakarta Sans'; color:rgba(16,32,58,.55); transition:color .2s; }
  .v2 .step.on .t { color:#10203A; }
  .v2 .link { flex:0 0 56px; height:2px; margin-top:22px; background:repeating-linear-gradient(90deg,rgba(16,32,58,.25) 0 5px,transparent 5px 10px); }
  .v2 .mtext li .ck { background:#FEF2E6; color:#DF7100; }

  /* V3 · Dark segmented */
  .v3 { padding:56px 64px; }
  .v3 .steps { display:inline-flex; gap:4px; margin:28px auto 0; padding:5px; border-radius:100px; background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1); }
  .v3 .stepswrap { display:flex; justify-content:center; }
  .v3 .step { background:none; border:none; cursor:pointer; padding:11px 24px; border-radius:100px; display:flex; align-items:center; gap:9px;
    font:700 15px/1 'Plus Jakarta Sans'; color:rgba(255,255,255,.6); transition:.2s; }
  .v3 .step .n { font:800 11px/1 'Schibsted Grotesk'; opacity:.7; }
  .v3 .step.on { background:#F57C00; color:#fff; box-shadow:0 8px 22px -8px rgba(245,124,0,.6); }
  .v3 .vid { box-shadow:0 40px 90px -40px rgba(0,0,0,.9), 0 0 70px -30px rgba(245,124,0,.3); border:1px solid rgba(255,255,255,.08); }
  .v3 .mtext li .ck { background:rgba(245,124,0,.18); color:#F8A754; }

  /* V4 · Card chips + browser frame */
  .v4 { padding:52px 64px; }
  .v4 .steps { display:flex; justify-content:center; gap:16px; margin-top:30px; }
  .v4 .step { width:236px; text-align:left; cursor:pointer; background:#fff; border:1.5px solid rgba(16,32,58,.12); border-radius:14px;
    padding:16px 18px; transition:.22s; }
  .v4 .step:hover { border-color:rgba(16,32,58,.24); }
  .v4 .step.on { border-color:#F57C00; box-shadow:0 14px 30px -16px rgba(245,124,0,.4); }
  .v4 .step .k { display:flex; align-items:center; justify-content:space-between; font:700 11px/1 'Plus Jakarta Sans'; letter-spacing:.05em; text-transform:uppercase; color:rgba(16,32,58,.45); }
  .v4 .step.on .k { color:#F57C00; }
  .v4 .step .t { font:700 18px/1.2 'Plus Jakarta Sans'; letter-spacing:-.01em; margin-top:9px; color:#10203A; }
  .v4 .step .arr { transition:transform .2s; }
  .v4 .step.on .arr { transform:translateX(3px); }
  .v4 .vframe { border-radius:16px; overflow:hidden; box-shadow:0 30px 64px -28px rgba(8,18,40,.5); border:1px solid rgba(16,32,58,.14); }
  .v4 .vframe .fbar { height:34px; background:#0a1120; display:flex; align-items:center; gap:6px; padding:0 13px; }
  .v4 .vframe .fbar i { width:9px; height:9px; border-radius:50%; background:#2c3a52; }
  .v4 .vframe .fbar .u { margin-left:12px; height:17px; flex:1; max-width:260px; border-radius:8px; background:#162338; }
  .v4 .vframe .vid { border-radius:0; box-shadow:none; }
  .v4 .mtext li .ck { background:#FEF2E6; color:#DF7100; }

  /* V5 · Editorial numbered */
  .v5 { padding:54px 64px; }
  .v5 .steps { display:flex; justify-content:center; margin-top:28px; }
  .v5 .step { background:none; border:none; cursor:pointer; padding:6px 34px; text-align:center; position:relative; }
  .v5 .step + .step { border-left:1px solid rgba(16,32,58,.14); }
  .v5 .step .n { font:800 30px/1 'Schibsted Grotesk'; letter-spacing:-.03em; color:rgba(16,32,58,.16); transition:color .2s; }
  .v5 .step .t { font:600 14px/1.2 'Plus Jakarta Sans'; color:rgba(16,32,58,.5); margin-top:8px; letter-spacing:.01em; transition:color .2s; }
  .v5 .step.on .n { color:#F57C00; }
  .v5 .step.on .t { color:#10203A; }
  .v5 .mtext { padding-left:22px; border-left:3px solid #F57C00; }
  .v5 .mtext li .ck { background:#FEF2E6; color:#DF7100; }

  /* =========================================================================
     B · EARLIER DIRECTIONS (m1–m6) — live product UI + real board
  ========================================================================= */
  img.ph { display:block; width:100%; height:100%; object-fit:cover; object-position:50% 50%; }

  .frame { border-radius:12px; overflow:hidden; background:#0c1424; border:1px solid rgba(16,32,58,.16); box-shadow:0 18px 40px -18px rgba(8,18,40,.5); }
  .frame .bar { height:30px; display:flex; align-items:center; gap:6px; padding:0 12px; background:#0a1120; border-bottom:1px solid rgba(255,255,255,.06); }
  .frame .bar i { width:9px; height:9px; border-radius:50%; background:#2c3a52; display:block; }
  .frame .bar .pill { margin-left:10px; height:15px; flex:1; max-width:220px; border-radius:8px; background:#162338; }
  .frame .scr { position:relative; overflow:hidden; background:#0c1424; }

  .ui { width:100%; height:100%; background:#0c1424; color:#fff; padding:16px 18px; display:flex; flex-direction:column; gap:11px; }
  .ui .uihead { display:flex; align-items:center; gap:9px; font:700 13.5px/1 'Plus Jakarta Sans'; }
  .ui .uihead .dot { width:20px; height:20px; border-radius:50%; background:linear-gradient(135deg,#F8A754,#F57C00); flex:0 0 20px; }
  .ui .uihead .tagr { margin-left:auto; font:600 11px/1 Roboto; color:rgba(255,255,255,.5); }
  .ui .evalbar { height:10px; border-radius:6px; background:linear-gradient(90deg,#15203a,#27374f); position:relative; }
  .ui .evalbar b { position:absolute; top:-3px; width:4px; height:16px; border-radius:2px; background:#fff; box-shadow:0 0 0 2px rgba(245,124,0,.5); }
  .coach .wk { display:flex; align-items:center; gap:10px; font:500 13px/1.25 Roboto; color:rgba(255,255,255,.82); background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:9px; padding:10px 12px; }
  .coach .wk em { width:7px; height:7px; border-radius:50%; flex:0 0 7px; }
  .coach .wk s { margin-left:auto; text-decoration:none; font:700 10.5px/1 'Plus Jakarta Sans'; letter-spacing:.04em; padding:4px 9px; border-radius:100px; }
  .coach .wk .hi { background:rgba(240,80,80,.16); color:#ff9b9b; } .coach .wk em.hi{ background:#ff6b6b; }
  .coach .wk .md { background:rgba(245,124,0,.18); color:#F8A754; } .coach .wk em.md{ background:#F8A754; }
  .coach .wk .lo { background:rgba(75,155,191,.18); color:#86c5e0; } .coach .wk em.lo{ background:#86c5e0; }
  .plan .prog { height:8px; border-radius:5px; background:rgba(255,255,255,.1); position:relative; overflow:hidden; }
  .plan .prog b { position:absolute; left:0; top:0; bottom:0; background:linear-gradient(90deg,#F8A754,#F57C00); border-radius:5px; }
  .plan .task { display:flex; align-items:center; gap:11px; font:500 13px/1.3 Roboto; color:rgba(255,255,255,.86); padding:9px 0; border-bottom:1px solid rgba(255,255,255,.06); }
  .plan .task .ck { width:18px; height:18px; border-radius:5px; border:1.5px solid rgba(255,255,255,.25); flex:0 0 18px; display:grid; place-items:center; color:#fff; font-size:11px; }
  .plan .task.done .ck { background:#F57C00; border-color:#F57C00; }
  .plan .task.done { color:rgba(255,255,255,.5); }

  /* M1 · Three-phase stepper (light) */
  .m1 { background:#F1F4F8; color:#10203A; padding:56px 64px; }
  .m1 .eyebrow { color:#F57C00; }
  .m1 h2 { font:700 42px/1.05 'Plus Jakarta Sans'; letter-spacing:-.025em; margin:14px 0 6px; }
  .m1 h2 .g { color:rgba(16,32,58,.32); }
  .m1 .sub { font:400 16px/1.5 Roboto; color:rgba(16,32,58,.6); max-width:560px; margin-bottom:40px; }
  .m1 .cols { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; position:relative; }
  .m1 .col .frame .scr { height:226px; }
  .m1 .col .num { display:inline-flex; align-items:center; gap:10px; white-space:nowrap; margin-top:22px; font:700 13px/1 Roboto; color:#F57C00; }
  .m1 .col .num .dot { width:26px; height:26px; border-radius:50%; background:#fff; border:1px solid rgba(16,32,58,.14); display:grid; place-items:center; font:800 12px/1 'Schibsted Grotesk'; color:#10203A; }
  .m1 .col h3 { font:700 23px/1.15 'Plus Jakarta Sans'; letter-spacing:-.02em; margin:12px 0 8px; }
  .m1 .col p { font:400 15px/1.55 Roboto; color:rgba(16,32,58,.62); }
  .m1 .track { position:absolute; top:113px; left:16%; right:16%; height:2px; background:repeating-linear-gradient(90deg,rgba(16,32,58,.2) 0 6px,transparent 6px 12px); z-index:0; }

  /* M2 · Vertical timeline + big screen (dark) */
  .m2 { background:radial-gradient(120% 90% at 85% 0%, #15233a, #080d16 72%); color:#fff; padding:58px 64px; display:flex; gap:56px; }
  .m2 .left { width:430px; flex:0 0 430px; }
  .m2 .eyebrow { color:#7FB0E6; }
